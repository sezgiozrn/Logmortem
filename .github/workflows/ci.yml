name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov=eval --cov-report=term-missing

      - name: Eval plumbing gate (no LLM, free)
        # Runs every fixture through the scoring pipeline without API calls.
        # Catches scorer/plumbing regressions on every PR; the full LLM eval
        # is the manual eval-llm workflow (costs a few cents, needs a key).
        run: python3 -m eval.harness --no-llm --gate
